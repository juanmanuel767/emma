server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /chat {
        proxy_pass http://gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /sessions {
        proxy_pass http://gateway:3000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://gateway:3000;
    }
}
